
# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "2de51d3dd0d8a659999980542ba7e63d"
name = "sdl-3d-hotspots"
application_url = "https://app.spectrumdesignlab.com"
embedded = true

[build]
automatically_update_urls_on_dev = false

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_metaobject_definitions,write_metaobjects,write_products,read_files,write_files,write_app_proxy"

[app_proxy]
url = "/proxy/sdl3d"
prefix = "apps"
subpath = "sdl3d"

[auth]
redirect_urls = [ "https://app.spectrumdesignlab.com/api/auth" ]
